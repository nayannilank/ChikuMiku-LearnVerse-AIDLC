service: chikumiku-learnverse-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'ap-south-1'}
  memorySize: 256
  timeout: 10
  environment:
    NODE_ENV: ${self:provider.stage}
    JWT_SECRET: ${ssm:/chikumiku/${self:provider.stage}/jwt-secret}
    JWT_EXPIRY_DAYS: '30'
    AUTH_MAX_FAILED_ATTEMPTS: '3'
    AUTH_LOCKOUT_DURATION_MINUTES: '15'
    DATABASE_TABLE_PREFIX: chikumiku-${self:provider.stage}
    STORAGE_BUCKET: !Ref ContentBucket
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt LearnersTable.Arn
            - !GetAtt AccountsTable.Arn
            - !GetAtt ContentTable.Arn
            - !Join ['/', [!GetAtt LearnersTable.Arn, 'index/*']]
            - !Join ['/', [!GetAtt AccountsTable.Arn, 'index/*']]
            - !Join ['/', [!GetAtt ContentTable.Arn, 'index/*']]
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
          Resource:
            - !Join ['/', [!GetAtt ContentBucket.Arn, '*']]

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002

functions:
  # --- Authentication (public) ---
  authLogin:
    handler: dist/lambda.handler
    timeout: 30
    events:
      - http:
          path: /api/v1/auth/login
          method: post
          cors: true

  authRegisterParent:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/auth/register/parent
          method: post
          cors: true

  authRegisterStudent:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/auth/register/student
          method: post
          cors: true

  authForgotPassword:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/auth/forgot-password
          method: post
          cors: true

  authValidate:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/auth/validate
          method: get
          cors: true
          authorizer:
            name: jwtAuthorizer
            type: TOKEN
            identitySource: method.request.header.Authorization
            resultTtlInSeconds: 300

  # --- Content: Textbooks ---
  listTextbooks:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/subjects/{subjectId}/textbooks
          method: get
          cors: true
          authorizer: jwtAuthorizer

  createTextbook:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/subjects/{subjectId}/textbooks
          method: post
          cors: true
          authorizer: jwtAuthorizer

  # --- Content: Chapters ---
  listChapters:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/textbooks/{textbookId}/chapters
          method: get
          cors: true
          authorizer: jwtAuthorizer

  createChapter:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/textbooks/{textbookId}/chapters
          method: post
          cors: true
          authorizer: jwtAuthorizer

  # --- Content: Pages ---
  addPage:
    handler: dist/lambda.handler
    memorySize: 512
    timeout: 30
    events:
      - http:
          path: /api/v1/chapters/{chapterId}/pages
          method: post
          cors: true
          authorizer: jwtAuthorizer

  # --- Subjects ---
  listSubjects:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/subjects
          method: get
          cors: true
          authorizer: jwtAuthorizer

  enrollSubject:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/subjects/{subjectId}/enroll
          method: post
          cors: true
          authorizer: jwtAuthorizer

  # --- Learning Session ---
  learningStart:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/learning/start
          method: post
          cors: true
          authorizer: jwtAuthorizer

  learningSelectSubject:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/learning/select-subject
          method: post
          cors: true
          authorizer: jwtAuthorizer

  learningSelectChapter:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/learning/select-chapter
          method: post
          cors: true
          authorizer: jwtAuthorizer

  learningNewChapter:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/learning/new-chapter
          method: post
          cors: true
          authorizer: jwtAuthorizer

  learningEndChapter:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/learning/end-chapter
          method: post
          cors: true
          authorizer: jwtAuthorizer

  learningEnd:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/learning/end
          method: post
          cors: true
          authorizer: jwtAuthorizer

  learningSession:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/learning/session
          method: get
          cors: true
          authorizer: jwtAuthorizer

  # --- Sync ---
  syncPush:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/sync/push
          method: post
          cors: true
          authorizer: jwtAuthorizer

  syncPull:
    handler: dist/lambda.handler
    events:
      - http:
          path: /api/v1/sync/pull
          method: get
          cors: true
          authorizer: jwtAuthorizer

  # --- JWT Authorizer ---
  jwtAuthorizer:
    handler: dist/authorizer.handler

resources:
  Resources:
    # --- DynamoDB Tables ---
    LearnersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: chikumiku-${self:provider.stage}-learners
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
          - AttributeName: sk
            KeyType: RANGE
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    AccountsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: chikumiku-${self:provider.stage}-accounts
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
          - AttributeName: username
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
          - AttributeName: sk
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: username-index
            KeySchema:
              - AttributeName: username
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: email-index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    ContentTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: chikumiku-${self:provider.stage}-content
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
          - AttributeName: sk
            KeyType: RANGE
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    # --- S3 Bucket for page images ---
    ContentBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: chikumiku-${self:provider.stage}-content-${aws:accountId}
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, PUT, POST]
              AllowedOrigins: ['*']
              MaxAge: 3600
        LifecycleConfiguration:
          Rules:
            - Id: TransitionToCold
              Status: Enabled
              Transitions:
                - TransitionInDays: 30
                  StorageClass: STANDARD_IA
                - TransitionInDays: 90
                  StorageClass: GLACIER_INSTANT_RETRIEVAL
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

  Outputs:
    ApiUrl:
      Description: API Gateway endpoint URL
      Value: !Sub 'https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${self:provider.stage}'
    ContentBucketName:
      Description: S3 bucket for content storage
      Value: !Ref ContentBucket
