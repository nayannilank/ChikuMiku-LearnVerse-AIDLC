name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - qa
          - prod

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: 22
  AWS_REGION: ap-south-1

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::165030184891:role/cdk-hnb659fds-deploy-role-165030184891-ap-south-1
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify identity
        run: aws sts get-caller-identity

      - name: Deploy CDK stack
        working-directory: infra/cdk
        run: npx cdk deploy ChikuMikuStack-${{ inputs.environment }} --require-approval never

      - name: Get CDK stack outputs
        id: cdk-outputs
        run: |
          WEB_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ChikuMikuStack-${{ inputs.environment }} \
            --query "Stacks[0].Outputs[?OutputKey=='WebAppBucketName'].OutputValue" \
            --output text)
          CF_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ChikuMikuStack-${{ inputs.environment }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          echo "web-app-bucket=$WEB_BUCKET" >> "$GITHUB_OUTPUT"
          echo "cloudfront-distribution-id=$CF_DIST_ID" >> "$GITHUB_OUTPUT"

      - name: Build web app
        working-directory: packages/platform-web/app
        run: npx vite build

      - name: Sync web assets to S3
        run: aws s3 sync packages/platform-web/app/dist/ s3://${{ steps.cdk-outputs.outputs.web-app-bucket }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cdk-outputs.outputs.cloudfront-distribution-id }} \
            --paths "/*"
