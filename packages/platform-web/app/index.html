<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <title>ChikuMiku LearnVerse</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Oxygen, Ubuntu, sans-serif;
        background: #f5f7fa;
        color: #333;
        min-height: 100vh;
      }

      header {
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        padding: 12px 24px;
        display: flex;
        align-items: center;
      }

      .app-container {
        max-width: 400px;
        margin: 60px auto;
        padding: 0 16px;
      }

      .login-card {
        background: #fff;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .login-card h2 {
        margin-bottom: 24px;
        font-size: 20px;
        text-align: center;
        color: #1a202c;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        font-weight: 500;
        color: #4a5568;
      }

      .form-group input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-size: 14px;
        transition: border-color 0.2s;
      }

      .form-group input:focus {
        outline: none;
        border-color: #4c6ef5;
        box-shadow: 0 0 0 3px rgba(76, 110, 245, 0.1);
      }

      .login-btn {
        width: 100%;
        padding: 12px;
        background: #4c6ef5;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 8px;
      }

      .login-btn:hover {
        background: #3b5bdb;
      }

      .login-btn:disabled {
        background: #a5b4fc;
        cursor: not-allowed;
      }

      .message {
        margin-top: 16px;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        text-align: center;
      }

      .message.success {
        background: #d3f9d8;
        color: #2b8a3e;
      }

      .message.error {
        background: #ffe3e3;
        color: #c92a2a;
      }

      .welcome-card {
        background: #fff;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        text-align: center;
      }

      .welcome-card h2 {
        color: #2b8a3e;
        margin-bottom: 8px;
      }

      .welcome-card p {
        color: #4a5568;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
